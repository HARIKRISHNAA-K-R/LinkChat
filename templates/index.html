<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LiveChat</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<!-- JOIN SCREEN -->

<div id="joinScreen" class="screen">

  <div class="join-card">

    <h1>LiveChat</h1>
    <p class="subtitle">Private rooms • Real-time messaging</p>

    <input
      id="usernameInput"
      type="text"
      placeholder="Enter your name"
      maxlength="20"
      autocomplete="off"
    >

    <input
      id="roomInput"
      type="text"
      placeholder="Enter room ID"
      maxlength="20"
      autocomplete="off"
    >

    <button onclick="joinRoom()">Join Room</button>

    <p id="joinError" class="error-msg"></p>

  </div>

</div>


<!-- CHAT SCREEN -->

<div id="chatScreen" class="screen hidden">

  <!-- Header -->

  <div class="chat-header">

    <div class="header-info">
      <span id="roomLabel">Room:</span>
      <span id="onlineCount" class="online-badge">0 online</span>
    </div>

    <button id="leaveBtn" onclick="leaveRoom()">Leave</button>

  </div>


  <!-- Chat Messages -->

  <div id="chatBox"></div>


  <!-- Message Input -->

  <div class="input-row">

    <input
      id="msgInput"
      type="text"
      placeholder="Type a message..."
      maxlength="500"
      autocomplete="off"
    >

    <button id="sendBtn" onclick="sendMsg()">Send</button>

  </div>

</div>


<!-- SocketIO -->

<script src="https://cdn.socket.io/4.3.2/socket.io.min.js"></script>

<!-- Chat Script -->

<script src="/static/script.js"></script>

</body>
</html>
